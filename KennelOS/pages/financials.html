<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Financials — KennelOS</title>
  <link rel="stylesheet" href="../assets/app.css">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../assets/icons/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#122138">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KennelOS">
</head>
<body>
  <div id="app-nav"></div>
  <main>
    <div class="page-header">
      <div>
        <h1>Financials</h1>
        <p class="page-subtitle" id="financials-subtitle"></p>
      </div>
      <button class="btn btn-primary" id="add-expense" hidden>+ Add Expense</button>
    </div>
    <nav class="seg-tabs" id="financials-view-tabs" aria-label="Financials views"></nav>
    <nav class="seg-tabs" id="financials-bucket-tabs" aria-label="Category / flow"></nav>
    <div id="page-error"></div>
    <section class="card" id="summary-section" style="margin-bottom:16px;">
      <div id="summary"></div>
    </section>
    <section class="card" id="report-section">
      <div id="report-mount"></div>
    </section>
  </main>

  <script type="module" src="../app.js"></script>
  <script type="module" src="./financials.js"></script>
</body>
</html>
