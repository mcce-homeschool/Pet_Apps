<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Receipts — for KennelOS</title>
  <link rel="stylesheet" href="assets/app.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#122138">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Receipts">
</head>
<body>
  <header class="app-bar">
    <div class="app-bar-inner">
      <div class="brand">
        <span class="brand-mark">🧾</span>
        <div>
          <h1>Receipts</h1>
          <p class="brand-sub">Business costs for KennelOS</p>
        </div>
      </div>
      <div class="app-bar-actions">
        <button class="icon-btn" id="btn-export" title="Export to KennelOS">⬆<span class="count-badge" id="unexported-count"></span></button>
        <button class="icon-btn" id="btn-settings" title="Settings">⚙</button>
      </div>
    </div>
    <div class="filter-row">
      <button class="filter active" data-kind="receipt">🧾 Receipts</button>
      <button class="filter" data-kind="trip">🚗 Trips</button>
    </div>
    <div class="filter-row">
      <button class="filter active" data-filter="all">All</button>
      <button class="filter" data-filter="unexported">Not exported</button>
      <span class="spacer"></span>
      <button class="filter" id="btn-list-filter">Filter</button>
    </div>
  </header>

  <main id="list" class="list"></main>

  <div class="fab-row">
    <button class="fab fab-trip" id="btn-trip">🚗<span>Trip</span></button>
    <button class="fab fab-primary" id="btn-receipt">📷<span>Receipt</span></button>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
